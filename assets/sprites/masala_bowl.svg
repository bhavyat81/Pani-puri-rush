<svg xmlns="http://www.w3.org/2000/svg" width="240" height="180" viewBox="0 0 240 180">
  <!-- Shadow -->
  <ellipse cx="112" cy="170" rx="90" ry="12" fill="#000" opacity="0.18"/>
  <!-- Bowl outer rim (metallic) -->
  <ellipse cx="112" cy="80" rx="100" ry="30" fill="#8a8a8a"/>
  <!-- Bowl body -->
  <path d="M12 80 Q12 158 112 162 Q212 158 212 80 Z" fill="#b0b0b0"/>
  <!-- Bowl inner shine -->
  <path d="M28 82 Q28 148 112 152 Q196 148 196 82 Z" fill="#c8c8c8"/>
  <!-- Masala fill (inside bowl) -->
  <ellipse cx="112" cy="80" rx="92" ry="26" fill="#8b4513"/>
  <!-- Masala surface texture -->
  <ellipse cx="112" cy="80" rx="88" ry="22" fill="#9a5020"/>
  <ellipse cx="95"  cy="77" rx="40" ry="12" fill="#a85828" opacity="0.7"/>
  <ellipse cx="138" cy="82" rx="28" ry="9" fill="#c06830" opacity="0.6"/>
  <!-- Spice dots -->
  <circle cx="80"  cy="76" r="4" fill="#4a1a00" opacity="0.7"/>
  <circle cx="120" cy="73" r="3" fill="#4a1a00" opacity="0.7"/>
  <circle cx="150" cy="79" r="4" fill="#4a1a00" opacity="0.7"/>
  <circle cx="100" cy="84" r="3" fill="#4a1a00" opacity="0.6"/>
  <!-- Spoon handle -->
  <line x1="155" y1="50" x2="195" y2="10" stroke="#aaa" stroke-width="8" stroke-linecap="round"/>
  <!-- Spoon head -->
  <ellipse cx="148" cy="57" rx="16" ry="10" fill="#c8c8c8" stroke="#aaa" stroke-width="2" transform="rotate(-45 148 57)"/>
  <!-- Bowl outer rim highlight -->
  <ellipse cx="112" cy="78" rx="95" ry="24" fill="none" stroke="#e0e0e0" stroke-width="3" opacity="0.6"/>
</svg>
