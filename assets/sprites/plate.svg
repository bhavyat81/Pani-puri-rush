<svg xmlns="http://www.w3.org/2000/svg" width="320" height="120" viewBox="0 0 320 120">
  <!-- Shadow -->
  <ellipse cx="160" cy="112" rx="140" ry="10" fill="#000" opacity="0.16"/>
  <!-- Plate rim (outer) -->
  <ellipse cx="160" cy="68" rx="150" ry="46" fill="#9e9e9e"/>
  <!-- Plate body -->
  <ellipse cx="160" cy="65" rx="145" ry="43" fill="#bdbdbd"/>
  <!-- Plate inner well -->
  <ellipse cx="160" cy="62" rx="120" ry="34" fill="#e0e0e0"/>
  <!-- Plate center (eating area) -->
  <ellipse cx="160" cy="60" rx="100" ry="28" fill="#eeeeee"/>
  <!-- Metallic highlight -->
  <ellipse cx="130" cy="52" rx="50" ry="14" fill="white" opacity="0.55"/>
  <!-- Rim decoration line -->
  <ellipse cx="160" cy="65" rx="138" ry="40" fill="none" stroke="#aaa" stroke-width="2.5" opacity="0.5"/>
  <ellipse cx="160" cy="63" rx="128" ry="37" fill="none" stroke="#c8c8c8" stroke-width="1.5" opacity="0.4"/>
</svg>
