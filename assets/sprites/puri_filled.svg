<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Shadow -->
  <ellipse cx="100" cy="182" rx="72" ry="14" fill="#000" opacity="0.18"/>
  <!-- Outer puri shell -->
  <circle cx="100" cy="96" r="84" fill="#b86308"/>
  <!-- Main puri body -->
  <circle cx="100" cy="96" r="78" fill="#d4830a"/>
  <!-- Highlight top-left -->
  <ellipse cx="76" cy="70" rx="40" ry="28" fill="#e8a020" opacity="0.55"/>
  <!-- Hole filled with masala -->
  <ellipse cx="100" cy="82" rx="24" ry="20" fill="#4a1c00"/>
  <!-- Masala surface (chunky brown) -->
  <ellipse cx="100" cy="80" rx="20" ry="16" fill="#7a3a10"/>
  <!-- Masala highlights -->
  <ellipse cx="96" cy="77" rx="10" ry="7" fill="#9a4e1a" opacity="0.8"/>
  <ellipse cx="107" cy="82" rx="6" ry="4" fill="#c06020" opacity="0.6"/>
  <!-- Surface texture rings -->
  <circle cx="100" cy="96" r="74" fill="none" stroke="#b86308" stroke-width="2.5" opacity="0.4"/>
  <circle cx="100" cy="96" r="56" fill="none" stroke="#c07010" stroke-width="2" opacity="0.3"/>
</svg>
