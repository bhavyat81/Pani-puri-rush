<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="220" viewBox="0 0 1080 220">
  <!-- Counter main body (wood) -->
  <rect x="0" y="30" width="1080" height="190" rx="0" fill="#6b3a1f"/>
  <!-- Top stripe (darker) -->
  <rect x="0" y="0" width="1080" height="40" fill="#4a2510"/>
  <!-- Top edge highlight -->
  <rect x="0" y="38" width="1080" height="6" fill="#8b5030"/>
  <!-- Wood grain lines -->
  <line x1="0"   y1="80"  x2="1080" y2="80"  stroke="#5a3015" stroke-width="1.5" opacity="0.4"/>
  <line x1="0"   y1="120" x2="1080" y2="120" stroke="#5a3015" stroke-width="1.5" opacity="0.4"/>
  <line x1="0"   y1="160" x2="1080" y2="160" stroke="#5a3015" stroke-width="1.5" opacity="0.4"/>
  <line x1="0"   y1="200" x2="1080" y2="200" stroke="#5a3015" stroke-width="1.5" opacity="0.4"/>
  <!-- Vertical grain hints -->
  <line x1="200" y1="40"  x2="220"  y2="220" stroke="#5a3015" stroke-width="1" opacity="0.25"/>
  <line x1="420" y1="40"  x2="405"  y2="220" stroke="#5a3015" stroke-width="1" opacity="0.25"/>
  <line x1="640" y1="40"  x2="658"  y2="220" stroke="#5a3015" stroke-width="1" opacity="0.25"/>
  <line x1="860" y1="40"  x2="845"  y2="220" stroke="#5a3015" stroke-width="1" opacity="0.25"/>
  <!-- Front face bottom shadow -->
  <rect x="0" y="210" width="1080" height="10" fill="#3a1a08" opacity="0.5"/>
</svg>
